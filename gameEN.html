<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein Snake</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <main class="game-page">
        <div class="title">
            <h1>Einstein Snake</h1>
            <img src="./images/einstein-logo.png" alt="Einstein Logo" height="50">
        </div>

        <div class="container">
            <div class="info">
                <div id="scoreBox">Photons: 0</div>
                <button id="restartBtn">Restart</button>
            </div>

            <canvas id="gameCanvas" width="540" height="960"></canvas>

            <div class="touch-controls" aria-label="Touch controls">
                <div class="control-group left-group">
                    <button class="control-btn" data-direction="LEFT" aria-label="Move left">←</button>
                    <button class="control-btn" data-direction="UP" aria-label="Move up">↑</button>
                </div>
                <div class="control-group right-group">
                    <button class="control-btn" data-direction="DOWN" aria-label="Move down">↓</button>
                    <button class="control-btn" data-direction="RIGHT" aria-label="Move right">→</button>
                </div>
            </div>
        </div>

        <div id="messageDisplay">Tap the game to start and help Einstein capture the photons! 💡</div>
    </main>

    <footer>Created by Lucas Ferreira (UnB/MNPEF) - CC BY-NC-ND 4.0</footer>

    <script src="functionsEN.js"></script>

</body>
</html>
