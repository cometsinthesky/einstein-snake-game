<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein Snake</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <main class="game-page">
        <div class="title">
            <div class="title-row">
                <h1>Einstein Snake</h1>
                <img src="./images/einstein-logo.png" alt="Logo Einstein" height="50">
            </div>
            <div id="messageDisplay">Toque no jogo para iniciar e ajudar o Einstein a capturar os fótons! 💡</div>
        </div>

        <div class="container">
            <div class="info">
                <div id="scoreBox">Fótons: 0</div>
                <button id="restartBtn">Reiniciar</button>
            </div>

            <canvas id="gameCanvas" width="540" height="960"></canvas>

            <div class="touch-controls" aria-label="Controles por toque">
                <div class="control-group left-group">
                    <button class="control-btn" data-direction="LEFT" aria-label="Mover para a esquerda">←</button>
                    <button class="control-btn" data-direction="DOWN" aria-label="Mover para baixo">↓</button>
                </div>
                <div class="control-group right-group">
                    <button class="control-btn" data-direction="UP" aria-label="Mover para cima">↑</button>
                    <button class="control-btn" data-direction="RIGHT" aria-label="Mover para a direita">→</button>
                </div>
            </div>
        </div>

    </main>

    <footer>Created by Lucas Ferreira (UnB/MNPEF) - CC BY-NC-ND 4.0</footer>

    <script src="functions.js"></script>

</body>
</html>
